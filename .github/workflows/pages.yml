name: Deploy to GitHub Pages

# Builds app/ with the project base path and publishes dist to Pages.
# One-time setup: repo Settings → Pages → Source must be "GitHub Actions".
#
# Note: Pages cannot send COOP/COEP headers, so the page is not
# crossOriginIsolated there — the visualizer audio rings fall back to
# status-message windows (handled in code); audio itself is unaffected.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build -- --base "/${{ github.event.repository.name }}/"
        working-directory: app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
